<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LuaShare</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <section class="card">
      <h1>LuaShare</h1>
      <p>Введите 6 значный код, чтобы получить скрипт</p>

      <div class="row">
        <input id="code" maxlength="6" inputmode="numeric" placeholder="000000">
        <button id="get">Получить</button>
      </div>

      <div id="msg"></div>

      <pre id="box" hidden><code id="out"></code></pre>
      <button id="copy" hidden>Копировать</button>
    </section>
  </main>

  <button id="menu" hidden>☰</button>

  <aside id="admin" hidden>
    <h2>Админ</h2>
    <textarea id="lua" placeholder="Lua script"></textarea>
    <button id="create">Создать код</button>
    <div id="newcode"></div>
  </aside>

  <script src="/app.js"></script>
</body>
</html>
