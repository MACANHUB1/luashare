<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>LuaShare</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <aside class="side" id="side">
    <div class="brand">LuaShare</div>

    <button class="nav active" data-page="main">
      <span>★</span>
      Main
    </button>

    <button class="nav" id="adminNav" data-page="admin" hidden>
      <span>◉</span>
      Administration
    </button>
  </aside>

  <main class="app">
    <button class="hamb" id="hamb">☰</button>

    <section class="page active" id="mainPage">
      <h1>Main</h1>

      <div class="codeInput" id="codeInput">
        <input maxlength="1" inputmode="numeric">
        <input maxlength="1" inputmode="numeric">
        <input maxlength="1" inputmode="numeric">
        <input maxlength="1" inputmode="numeric">
        <input maxlength="1" inputmode="numeric">
        <input maxlength="1" inputmode="numeric">
      </div>

      <button class="primary" id="get">Получить</button>

      <div class="scriptBox" id="scriptBox">
        <pre><code id="out">Script here</code></pre>
      </div>

      <div class="actions">
        <button id="download">⇩</button>
        <button id="copy">▣</button>
      </div>

      <div class="msg" id="msg"></div>
    </section>

    <section class="page" id="adminPage">
      <h1>Administration</h1>

      <textarea id="lua" placeholder="Script here"></textarea>

      <div class="actions wide">
        <button id="clear">⌫</button>
        <button id="create">▷</button>
      </div>

      <div class="msg" id="newcode"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
